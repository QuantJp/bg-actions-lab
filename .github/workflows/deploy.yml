name: Blue-Green Deploy Test

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build BLUE
        run: |
          docker build -t my-app:blue .

      - name: Run BLUE
        run: |
          echo "=== BLUE DEPLOY ==="
          docker run my-app:blue

      - name: Simulate GREEN switch
        run: |
          echo "=== SWITCH TO GREEN ==="
          echo "GREEN VERSION DEPLOYED"
